name: CI

on:
  push:
    branches: [ main, "feat/*" ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # Les tests utilisent SQLite en mémoire (config/settings/test.py) — pas besoin de PostgreSQL en CI

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: bdc-peinture
        run: uv sync

      - name: Lint with Ruff
        working-directory: bdc-peinture
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        working-directory: bdc-peinture
        env:
          SECRET_KEY: test-secret-key-not-for-production
        run: uv run pytest -v --tb=short
