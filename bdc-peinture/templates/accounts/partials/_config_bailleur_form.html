<form method="post" action="{% url 'gestion:config_bailleurs' %}" class="px-6 py-5 space-y-5">
    {% csrf_token %}
    <input type="hidden" name="bailleur_id" value="{{ bailleur.pk }}">

    {% for groupe, champs in champs_disponibles.items %}
    <div>
        <h3 class="text-xs font-semibold text-[var(--color-text-muted)] uppercase tracking-wider mb-2">{{ groupe }}</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {% for cle, libelle in champs %}
            <label class="flex items-center gap-2 px-3 py-2 rounded-lg border border-[var(--color-border)] hover:border-accent/50 cursor-pointer transition-colors
                          {% if cle in bailleur.champs_masques %}bg-accent/5 border-accent/30{% endif %}">
                <input type="checkbox" name="champs_masques" value="{{ cle }}"
                       {% if cle in bailleur.champs_masques %}checked{% endif %}
                       class="h-4 w-4 rounded border-[var(--color-border)] text-accent focus:ring-accent">
                <span class="text-sm text-[var(--color-text)]">{{ libelle }}</span>
            </label>
            {% endfor %}
        </div>
    </div>
    {% endfor %}

    <div class="flex items-center gap-3 pt-2">
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-accent text-white text-sm font-medium hover:bg-accent-dark transition-colors">
            Enregistrer
        </button>
        <span class="text-xs text-[var(--color-text-muted)]">
            Les champs coches seront remplaces par ***** sur le PDF envoye au sous-traitant
        </span>
    </div>
</form>
