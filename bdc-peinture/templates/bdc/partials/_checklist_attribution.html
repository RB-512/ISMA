{% comment %}
Checklist inline pour le formulaire d'attribution.
Affichée entre le commentaire et le bouton Attribuer.
Context requis : checklist_items (liste de ChecklistItem)
{% endcomment %}
{% if checklist_items %}
<div class="border border-amber-300 dark:border-amber-600 rounded-lg p-4 bg-amber-50/50 dark:bg-amber-900/20">
    <h4 class="text-xs font-semibold text-amber-700 dark:text-amber-400 uppercase tracking-wider mb-3">
        Points de contrôle
    </h4>
    <div class="space-y-2">
        {% for item in checklist_items %}
        <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox"
                   name="checklist_{{ item.pk }}"
                   class="checklist-cb h-4 w-4 rounded border-gray-300 text-accent focus:ring-accent/50"
                   @change="checkAll()">
            <span class="text-sm text-[var(--color-text)] group-hover:text-accent transition-colors">
                {{ item.libelle }}
            </span>
        </label>
        {% endfor %}
    </div>
</div>
{% endif %}
