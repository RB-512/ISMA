{% extends "base.html" %}

{% block title %}Importer un PDF — ISMA{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-[var(--color-text)] mb-2">Importer un bon de commande</h1>
    <p class="text-sm text-[var(--color-text-muted)] mb-6">
        Formats support&eacute;s : <strong class="text-[var(--color-text)]">GDH</strong> et <strong class="text-[var(--color-text)]">ERILIA</strong>. Le PDF sera analys&eacute; automatiquement.
    </p>

    <div class="bg-[var(--color-surface-card)] rounded-xl border border-[var(--color-border)] p-6">
        <form method="post" enctype="multipart/form-data"
              x-data="{
                  dragging: false,
                  fileName: '',
                  handleDrop(e) {
                      this.dragging = false;
                      if (e.dataTransfer.files.length) {
                          this.$refs.fileInput.files = e.dataTransfer.files;
                          this.fileName = e.dataTransfer.files[0].name;
                      }
                  }
              }">
            {% csrf_token %}

            {# Drop zone — uses native <label> for click-to-open, no JS needed #}
            <label for="id_pdf_file"
                   @dragover.prevent="dragging = true"
                   @dragleave.prevent="dragging = false"
                   @drop.prevent="handleDrop($event)"
                   :class="dragging ? 'border-accent bg-accent/5' : 'border-[var(--color-border)] hover:border-accent/50'"
                   class="flex flex-col items-center justify-center p-10 border-2 border-dashed rounded-xl cursor-pointer transition-all duration-200">

                {# Icon #}
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4"
                     :class="fileName ? 'bg-success/10 text-success' : 'bg-accent/10 text-accent'">
                    <template x-if="!fileName">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    </template>
                    <template x-if="fileName">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </template>
                </div>

                {# Text #}
                <template x-if="!fileName">
                    <div class="text-center">
                        <p class="text-sm font-medium text-[var(--color-text)]">Glisser-d&eacute;poser un fichier PDF</p>
                        <p class="text-xs text-[var(--color-text-muted)] mt-1">ou cliquer pour s&eacute;lectionner</p>
                    </div>
                </template>
                <template x-if="fileName">
                    <div class="text-center">
                        <p class="text-sm font-medium text-success" x-text="fileName"></p>
                        <p class="text-xs text-[var(--color-text-muted)] mt-1">Cliquer pour changer de fichier</p>
                    </div>
                </template>

                <input type="file" id="id_pdf_file" x-ref="fileInput"
                       @change="if($event.target.files.length) fileName = $event.target.files[0].name"
                       name="pdf_file" accept=".pdf,application/pdf" required
                       class="sr-only">
            </label>

            <p class="text-xs text-[var(--color-text-muted)] mt-3">Taille maximale : 10 Mo</p>

            {# Submit #}
            <div class="mt-5">
                <button type="submit"
                        class="w-full py-2.5 px-4 bg-accent hover:bg-accent-dark text-white font-semibold rounded-lg text-sm transition-all duration-150 shadow-sm hover:shadow-md
                               focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 dark:focus:ring-offset-[var(--color-surface)]">
                    Analyser le PDF
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
