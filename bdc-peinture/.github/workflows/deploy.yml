name: CD

on:
  # Se déclenche uniquement après que le workflow CI est terminé avec succès sur main
  workflow_run:
    workflows: ["CI"]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Ne déploie que si la CI a réussi
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/bdc-peinture/bdc-peinture/scripts/deploy.sh
