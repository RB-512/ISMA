# Configuration Nginx temporaire pour le bootstrap SSL (première installation)
# Utilisé par initial_setup.sh pour obtenir le certificat Let's Encrypt
# sans référencer des certificats qui n'existent pas encore.
# Remplacé par nginx.conf après obtention du certificat.

server {
    listen 80;
    server_name _;

    # Nécessaire pour Certbot (vérification de domaine ACME)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Bootstrap OK';
        add_header Content-Type text/plain;
    }
}
